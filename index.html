<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prime Club</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: Arial, sans-serif;
      background: lightpink;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      color: olivedrab;
      margin-bottom: 40px;
    }

    .menu {
      display: flex;
      gap: 30px;
    }

    .menu a {
      padding: 30px 50px;
      background: lightseagreen;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      color: darkmagenta;
      box-shadow: 0 6px darkmagenta;
      transition: transform 0.3s;
    }

    .menu a:hover {
      transform: scale(1.15);
    }
  </style>
</head>

<body>

  <h1>Welcome to Prime Club</h1>

  <div class="menu">
    <a href="resume.html">My Resume</a>
    <a href="store.html">My Store</a>
  </div>

</body>
</html>
